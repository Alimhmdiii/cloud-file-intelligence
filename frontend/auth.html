<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud File Intelligence — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eeeeff;
      --card: rgba(255,255,255,0.8);
      --card-border: rgba(255,255,255,0.9);
      --primary: #534AB7;
      --primary-light: rgba(83,74,183,0.08);
      --primary-dark: #3C3489;
      --border: rgba(83,74,183,0.15);
      --text: #1a1a2e;
      --text-secondary: #666;
      --text-muted: #aaa;
      --error: #791F1F;
      --error-bg: #fcebeb;
      --shadow: 0 8px 32px rgba(83,74,183,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; position: relative; overflow: hidden; }
    body::before { content: ''; position: fixed; top: -50%; right: -20%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(83,74,183,0.15) 0%, transparent 70%); pointer-events: none; }
    body::after { content: ''; position: fixed; bottom: -30%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(127,119,221,0.1) 0%, transparent 70%); pointer-events: none; }
    .card { background: var(--card); backdrop-filter: blur(16px); border-radius: 24px; padding: 36px 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow); border: 1px solid var(--card-border); position: relative; z-index: 1; }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .logo p { font-size: 13px; color: var(--text-secondary); }
    .tabs { display: flex; background: var(--primary-light); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 10px; transition: all 0.2s; color: var(--text-secondary); border: none; background: none; font-family: 'Inter', sans-serif; }
    .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(83,74,183,0.15); }
    .form { display: none; }
    .form.active { display: block; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px; background: var(--primary-light); color: var(--text); outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--primary); background: white; }
    .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 12px; font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.25s; box-shadow: 0 4px 16px rgba(83,74,183,0.3); margin-top: 8px; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(83,74,183,0.4); }
    .btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
    .error-msg { background: var(--error-bg); color: var(--error); padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; display: none; }
    .error-msg.show { display: block; }
    .divider { text-align: center; font-size: 12px; color: var(--text-muted); margin: 16px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>☁️ Cloud File Intelligence</h1>
    <p>Upload and analyze files with AI</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form active" id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Login →</button>
    <div class="divider">Don't have an account? <a href="#" onclick="switchTab('register')" style="color:var(--primary)">Register</a></div>
  </div>

  <div class="form" id="registerForm">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="registerName" placeholder="John Doe">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="registerEmail" placeholder="your@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="registerPassword" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter') register()">
    </div>
    <button class="btn" id="registerBtn" onclick="register()">Create Account →</button>
    <div class="divider">Already have an account? <a href="#" onclick="switchTab('login')" style="color:var(--primary)">Login</a></div>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) {
    window.location.href = 'index.html'
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')))
    document.getElementById('loginForm').classList.toggle('active', tab === 'login')
    document.getElementById('registerForm').classList.toggle('active', tab === 'register')
    hideError()
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg')
    el.textContent = msg
    el.classList.add('show')
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('show')
  }

  async function login() {
    const email = document.getElementById('loginEmail').value.trim()
    const password = document.getElementById('loginPassword').value
    if (!email || !password) return showError('Please fill in all fields')

    const btn = document.getElementById('loginBtn')
    btn.disabled = true
    btn.textContent = 'Logging in...'
    hideError()

    try {
      const res = await fetch('http://localhost:3000/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      const data = await res.json()
      if (data.error) throw new Error(data.error)

      localStorage.setItem('token', data.token)
      localStorage.setItem('user', JSON.stringify(data.user))
      window.location.href = 'index.html'
    } catch (err) {
      showError(err.message)
      btn.disabled = false
      btn.textContent = 'Login →'
    }
  }

  async function register() {
    const name = document.getElementById('registerName').value.trim()
    const email = document.getElementById('registerEmail').value.trim()
    const password = document.getElementById('registerPassword').value
    if (!name || !email || !password) return showError('Please fill in all fields')

    const btn = document.getElementById('registerBtn')
    btn.disabled = true
    btn.textContent = 'Creating account...'
    hideError()

    try {
      const res = await fetch('http://localhost:3000/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      })
      const data = await res.json()
      if (data.error) throw new Error(data.error)

      localStorage.setItem('token', data.token)
      localStorage.setItem('user', JSON.stringify(data.user))
      window.location.href = 'index.html'
    } catch (err) {
      showError(err.message)
      btn.disabled = false
      btn.textContent = 'Create Account →'
    }
  }
</script>
</body>
</html>
